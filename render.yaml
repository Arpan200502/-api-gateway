services:
  - type: web
    name: api-gateway-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: KAFKA_BROKER
        sync: false
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: api-gateway-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npx vite build
    startCommand: node server.js
    envVars:
      - key: BACKEND_URL
        fromService:
          name: api-gateway-backend
          property: envUrl
